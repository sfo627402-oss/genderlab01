services:
  - type: web
    name: genderlab16
    env: docker
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://genderlab16.onrender.com
      - key: ASSET_URL
        value: https://genderlab16.onrender.com
      - key: APP_KEY
        value: base64:pwUdpUP9jxkOR0qMT4GeulW71vtBEUsUExEkMsAiEuE=
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_FOREIGN_KEYS
        value: "true"
